<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tied together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #f0e8d8;
      --cream-dim:    rgba(240, 232, 216, 0.82);
      --cream-faint:  rgba(240, 232, 216, 0.55);
      --glass:        rgba(245, 235, 210, 0.10);
      --glass-hover:  rgba(245, 235, 210, 0.15);
      --border:       rgba(255, 255, 255, 0.13);
      --border-warm:  rgba(220, 190, 140, 0.35);
      --sage:         #8fb992;
      --sage-dark:    #5a8a60;
      --sage-light:   #b8d4b8;
      --blush:        #e8b4b8;
      --blush-deep:   #c97b84;
      --lavender:     #c4b0e0;
      --amber:        #d4a843;
      --amber-dim:    rgba(212, 168, 67, 0.7);
      --soil:         rgba(90, 62, 34, 1);
      --gold:         #e0b84a;
      --shadow:       rgba(0, 0, 0, 0.45);
      --text-shadow:  0 1px 4px rgba(0,0,0,0.6);
    }

    html { scroll-behavior: smooth; }

    /* ─── Van Gogh Background ────────────────────────────────── */
    body {
      font-family: 'Lora', serif;
      color: var(--cream);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background-color: #1a1410;
      background-size: 120%;
      background-position: center center;
      animation: kenBurns 120s ease-in-out infinite alternate;
    }

    @keyframes kenBurns {
      0%   { background-size: 120%; background-position: 50% 50%; }
      25%  { background-size: 125%; background-position: 48% 52%; }
      50%  { background-size: 122%; background-position: 53% 48%; }
      75%  { background-size: 127%; background-position: 47% 53%; }
      100% { background-size: 124%; background-position: 52% 50%; }
    }

    /* ─── Dark Overlay ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ─── Glass Card Base ────────────────────────────────────── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-top: 1rem;
    }

    .header-ornament {
      font-size: 0.85rem;
      color: var(--amber-dim);
      letter-spacing: 0.5em;
      margin-bottom: 0.75rem;
      text-shadow: var(--text-shadow);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.01em;
      line-height: 1.1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.7), 0 1px 3px rgba(0,0,0,0.5);
    }

    .subtitle {
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--cream-faint);
      margin-top: 0.6rem;
      font-size: 0.92rem;
      text-shadow: var(--text-shadow);
    }

    /* ─── Settings Panel ─────────────────────────────────────── */
    .settings-panel {
      padding: 0.85rem 1.2rem;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .settings-label {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--cream-faint);
      white-space: nowrap;
      flex-shrink: 0;
      text-shadow: var(--text-shadow);
      letter-spacing: 0.02em;
    }

    .key-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blush-deep);
      margin-right: 0.45rem;
      vertical-align: middle;
      transition: background 0.3s;
    }

    .key-dot.connected { background: var(--sage); }

    #api-key-input {
      flex: 1;
      min-width: 180px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-warm);
      border-radius: 8px;
      padding: 0.42rem 0.75rem;
      font-size: 0.8rem;
      font-family: 'Lora', monospace;
      color: var(--cream);
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }

    #api-key-input::placeholder { color: rgba(240,232,216,0.3); }
    #api-key-input:focus { outline: none; border-color: var(--amber-dim); }

    .btn-save-key {
      background: rgba(212, 168, 67, 0.25);
      color: var(--amber);
      border: 1px solid var(--amber-dim);
      border-radius: 8px;
      padding: 0.42rem 1rem;
      font-size: 0.78rem;
      font-family: 'Lora', serif;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-save-key:hover { background: rgba(212, 168, 67, 0.38); }

    /* ─── Oracle Section ─────────────────────────────────────── */
    .oracle-section {
      padding: 2rem 2rem 2rem;
      margin-bottom: 1.75rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 400;
      color: var(--cream-faint);
      margin-bottom: 1.2rem;
      text-shadow: var(--text-shadow);
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }

    .mood-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    #mood-input {
      flex: 1;
      min-width: 200px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border-warm);
      border-radius: 12px;
      padding: 0.8rem 1.1rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #mood-input::placeholder { color: rgba(240,232,216,0.3); }
    #mood-input:focus {
      outline: none;
      border-color: var(--amber-dim);
      box-shadow: 0 0 0 3px rgba(212,168,67,0.1);
    }

    .btn-thread {
      background: rgba(90, 138, 96, 0.35);
      color: var(--sage-light);
      border: 1px solid rgba(143, 185, 146, 0.4);
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      white-space: nowrap;
      align-self: flex-start;
    }

    .btn-thread:hover {
      background: rgba(90, 138, 96, 0.5);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    .btn-thread:active { transform: translateY(0); }
    .btn-thread:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ─── Seed Card ──────────────────────────────────────────── */
    .seed-card {
      margin-top: 1.5rem;
      background: rgba(212, 168, 67, 0.08);
      border-radius: 14px;
      padding: 1.75rem 2rem;
      border-left: 3px solid var(--amber-dim);
      position: relative;
      overflow: hidden;
      animation: fadeSlideIn 0.6s ease;
    }

    .seed-card::before {
      content: '\201C';
      position: absolute;
      top: -1rem;
      left: 1rem;
      font-family: 'Playfair Display', serif;
      font-size: 6rem;
      color: var(--amber);
      opacity: 0.12;
      line-height: 1;
      pointer-events: none;
    }

    .seed-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      line-height: 1.75;
      color: var(--cream);
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    .seed-meta {
      margin-top: 0.8rem;
      font-size: 0.72rem;
      color: var(--cream-faint);
      font-style: italic;
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-top-color: var(--sage-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ─── Writing + Plant Section ───────────────────────────── */
    .writing-section {
      display: none;
      animation: fadeSlideIn 0.6s ease;
    }

    .writing-section.visible { display: block; }

    .writing-grid {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 620px) {
      .writing-grid { grid-template-columns: 1fr; }
      .plant-panel { order: -1; }
    }

    /* ─── Writing Panel ──────────────────────────────────────── */
    .writing-panel {
      padding: 1.75rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .writing-header {
      margin-bottom: 1rem;
    }

    #story-textarea {
      width: 100%;
      min-height: 300px;
      background: rgba(0,0,0,0.22);
      border: 1px solid var(--border-warm);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--cream);
      resize: vertical;
      transition: border-color 0.2s;
    }

    #story-textarea:focus { outline: none; border-color: var(--amber-dim); }

    #story-textarea::placeholder {
      color: rgba(240,232,216,0.28);
      font-style: italic;
    }

    .word-count-display {
      margin-top: 0.7rem;
      font-size: 0.75rem;
      color: var(--cream-faint);
      text-align: right;
      opacity: 0.7;
    }

    .word-count-display strong {
      color: var(--sage-light);
    }

    /* ─── Plant Panel ────────────────────────────────────────── */
    .plant-panel {
      padding: 1.5rem 1rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      text-align: center;
      position: sticky;
      top: 1.5rem;
    }

    #plant-svg {
      width: 150px;
      height: 190px;
      display: block;
      margin: 0 auto 1rem;
      overflow: visible;
    }

    .plant-stage-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--sage-light);
      margin-bottom: 0.3rem;
      text-shadow: var(--text-shadow);
    }

    .plant-word-count {
      font-size: 0.72rem;
      color: var(--cream-faint);
      opacity: 0.6;
      font-family: 'Lora', serif;
    }

    /* ─── Restart ────────────────────────────────────────────── */
    .restart-row {
      text-align: center;
      margin-top: 1.5rem;
    }

    .btn-restart {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--cream-faint);
      border-radius: 10px;
      padding: 0.55rem 1.3rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-shadow: var(--text-shadow);
    }

    .btn-restart:hover {
      border-color: var(--blush-deep);
      color: var(--blush);
      background: rgba(201, 123, 132, 0.1);
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      margin-top: 3.5rem;
      font-size: 0.72rem;
      color: var(--cream-faint);
      opacity: 0.4;
      font-style: italic;
      text-shadow: var(--text-shadow);
    }

    /* ─── Keyframes ──────────────────────────────────────────── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes sway {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(1.2deg); }
      75%  { transform: rotate(-1.2deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes bloomPop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .sway-root {
      transform-origin: 75px 185px;
      animation: sway 5s ease-in-out infinite;
    }

    .bloom-pop {
      transform-origin: center;
      animation: bloomPop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- Header -->
  <header>
    <div class="header-ornament">— ✦ —</div>
    <h1>tied together</h1>
    <p class="subtitle">every story is a rope between strangers</p>
  </header>

  <!-- API Key Settings -->
  <div class="settings-panel glass">
    <div class="settings-label">
      <span class="key-dot" id="key-dot"></span>Groq API key
    </div>
    <input type="password" id="api-key-input" placeholder="gsk_…" autocomplete="off" />
    <button class="btn-save-key" onclick="saveApiKey()">save</button>
  </div>

  <!-- Oracle Section -->
  <div class="oracle-section glass">
    <div class="section-title">the oracle</div>
    <div class="mood-row">
      <input
        id="mood-input"
        type="text"
        placeholder="what does the air feel like right now…"
        maxlength="200"
        onkeydown="if(event.key==='Enter') plantSeed()"
      />
      <button class="btn-thread" id="plant-btn" onclick="plantSeed()">
        find your thread
      </button>
    </div>
    <div id="seed-card-container"></div>
  </div>

  <!-- Writing + Plant Section -->
  <div class="writing-section" id="writing-section">
    <div class="writing-grid">

      <!-- Textarea Panel -->
      <div class="writing-panel glass">
        <div class="writing-header">
          <div class="section-title" style="margin-bottom:0">start pulling</div>
        </div>
        <textarea
          id="story-textarea"
          placeholder="all these humans need is solace, and all these humans need is connection..."
          oninput="onStoryInput()"
        ></textarea>
        <div class="word-count-display">
          <strong id="wc-num">0</strong> words
        </div>
      </div>

      <!-- Plant Panel -->
      <div class="plant-panel glass">
        <svg id="plant-svg" viewBox="0 0 150 190" xmlns="http://www.w3.org/2000/svg">
        </svg>
        <div class="plant-stage-label" id="stage-label">the rope is slack</div>
        <div class="plant-word-count" id="stage-words">0 / 5 words</div>
      </div>

    </div>

    <div class="restart-row">
      <button class="btn-restart" onclick="startOver()">let go &amp; begin again</button>
    </div>
  </div>

  <footer>for the strangers who become something more</footer>
</div>

<script>
// ─── Van Gogh Backgrounds ─────────────────────────────────────
const VAN_GOGH = [
  'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Vincent_van_Gogh_-_Wheatfield_with_crows_-_Google_Art_Project.jpg/1280px-Vincent_van_Gogh_-_Wheatfield_with_crows_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Van_Gogh_-_Almond_Blossom_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Almond_Blossom_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Irises-Vincent_van_Gogh.jpg/1280px-Irises-Vincent_van_Gogh.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Vincent_van_Gogh_-_De_slaapkamer_-_Google_Art_Project.jpg/1280px-Vincent_van_Gogh_-_De_slaapkamer_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Van_Gogh_Cafe_terrace_at_night_%28Yorck%29.jpg/1024px-Van_Gogh_Cafe_terrace_at_night_%28Yorck%29.jpg',
];

const chosenPainting = VAN_GOGH[Math.floor(Math.random() * VAN_GOGH.length)];
document.body.style.backgroundImage = `url('${chosenPainting}')`;

// ─── State ────────────────────────────────────────────────────
let apiKey = localStorage.getItem('oracle_api_key') || '';
let currentSeed = localStorage.getItem('oracle_seed') || '';
let currentStage = -1;

// ─── API Key ──────────────────────────────────────────────────
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('oracle_api_key', val);
  updateKeyStatus();
}

function updateKeyStatus() {
  const dot = document.getElementById('key-dot');
  if (apiKey && apiKey.length > 10) {
    dot.classList.add('connected');
  } else {
    dot.classList.remove('connected');
  }
}

// ─── Oracle ───────────────────────────────────────────────────
async function plantSeed() {
  if (!apiKey) {
    alert('Add your Groq API key first — it\'s free at console.groq.com');
    document.getElementById('api-key-input').focus();
    return;
  }

  const mood = document.getElementById('mood-input').value.trim();
  if (!mood) {
    document.getElementById('mood-input').focus();
    return;
  }

  const btn = document.getElementById('plant-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>listening…';

  const container = document.getElementById('seed-card-container');
  container.innerHTML = '';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 120,
        temperature: 1.0,
        messages: [{
          role: 'user',
          content: `You are a literary oracle. Given a mood or vibe, generate exactly ONE opening line for a literary novel.
The line must be poetic, mysterious, and evocative — like the opening of a Booker Prize winner.
Under 60 words. No quotation marks. No explanation. Just the line itself.

Mood / vibe: "${mood}"`,
        }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const seedText = data.choices?.[0]?.message?.content?.trim() || '';
    if (!seedText) throw new Error('The oracle returned silence.');

    currentSeed = seedText;
    localStorage.setItem('oracle_seed', seedText);
    localStorage.setItem('oracle_mood', mood);

    renderSeedCard(seedText, mood);
    showWritingSection();
  } catch (e) {
    container.innerHTML = `<div class="seed-card" style="border-left-color:rgba(201,123,132,0.6)">
      <p class="seed-text" style="color:var(--blush);font-size:0.9rem">${escapeHtml(e.message)}</p>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'find your thread';
  }
}

function renderSeedCard(text, mood) {
  document.getElementById('seed-card-container').innerHTML = `
    <div class="seed-card">
      <p class="seed-text">${escapeHtml(text)}</p>
      <p class="seed-meta">drawn from: "${escapeHtml(mood)}"</p>
    </div>`;
}

// ─── Writing Section ──────────────────────────────────────────
function showWritingSection() {
  const section = document.getElementById('writing-section');
  section.classList.add('visible');
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);

  const saved = localStorage.getItem('oracle_story') || '';
  document.getElementById('story-textarea').value = saved;
  updatePlant(countWords(saved));
}

function onStoryInput() {
  const text = document.getElementById('story-textarea').value;
  localStorage.setItem('oracle_story', text);
  const wc = countWords(text);
  document.getElementById('wc-num').textContent = wc;
  updatePlant(wc);
}

function countWords(text) {
  return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
}

// ─── Plant / Growth Stages ────────────────────────────────────
const STAGES = [
  { min: 0,   label: 'the rope is slack',    next: 5   },
  { min: 5,   label: 'a simple bow knot',    next: 20  },
  { min: 20,  label: 'the knot holds',       next: 50  },
  { min: 50,  label: 'sailor proof',         next: 100 },
  { min: 100, label: 'beginning to bloom',   next: 200 },
  { min: 200, label: 'together',             next: null },
];

function getStage(wc) {
  if (wc >= 200) return 5;
  if (wc >= 100) return 4;
  if (wc >= 50)  return 3;
  if (wc >= 20)  return 2;
  if (wc >= 5)   return 1;
  return 0;
}

function updatePlant(wc) {
  const stage = getStage(wc);
  const info = STAGES[stage];
  document.getElementById('stage-label').textContent = info.label;
  document.getElementById('stage-words').textContent = info.next
    ? `${wc} / ${info.next} words`
    : `${wc} words`;
  if (stage !== currentStage) {
    currentStage = stage;
    drawPlant(stage);
  }
}

// ─── SVG Plant Drawing ────────────────────────────────────────
function drawPlant(stage) {
  const svg = document.getElementById('plant-svg');
  let html = '';

  // Soil — always
  html += `
    <ellipse cx="75" cy="182" rx="52" ry="9"  fill="rgba(90,62,34,0.85)"/>
    <ellipse cx="75" cy="179" rx="44" ry="6"  fill="rgba(90,62,34,0.55)"/>
    <ellipse cx="75" cy="176" rx="34" ry="3.5" fill="rgba(90,62,34,0.35)"/>
  `;

  if (stage === 0) {
    html += `
      <ellipse cx="75" cy="172" rx="8" ry="5.5" fill="#8B6340"/>
      <ellipse cx="75" cy="171" rx="6" ry="4.5" fill="#A07848"/>
      <line x1="75" y1="166" x2="75" y2="162" stroke="${sg()}" stroke-width="1.5" stroke-linecap="round"/>
    `;
  }

  if (stage >= 1) {
    const h = stage === 1 ? 28 : 75 + (stage - 1) * 14;
    const top = 176 - h;
    html += `
      <path d="M75,176 Q73,${176 - h * 0.4} 75,${top}"
        stroke="${sgd()}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    `;
  }

  if (stage === 1) {
    html += `
      <ellipse cx="67" cy="153" rx="9" ry="5" fill="${sgl()}" transform="rotate(-28,67,153)"/>
      <ellipse cx="83" cy="153" rx="9" ry="5" fill="${sgl()}" transform="rotate(28,83,153)"/>
    `;
  }

  if (stage >= 2) {
    html += `
      <path d="M73,148 Q50,138 47,123 Q58,131 73,141" fill="${sg()}" opacity="0.9"/>
      <path d="M77,143 Q100,133 103,118 Q93,126 77,136" fill="${sg()}" opacity="0.9"/>
    `;
  }

  if (stage >= 3) {
    html += `
      <path d="M73,118 Q50,105 46,91 Q57,101 73,111" fill="${sgd()}" opacity="0.85"/>
      <path d="M77,113 Q100,100 104,86 Q93,96 77,106" fill="${sgd()}" opacity="0.85"/>
      <path d="M74,134 Q63,122 61,111 Q68,119 75,128" fill="${sg()}" opacity="0.7"/>
    `;
  }

  if (stage >= 4) {
    html += flower(75, 88, 17, 'var(--blush)', 'var(--gold)', true);
  }

  if (stage >= 5) {
    html += `
      <path d="M73,133 Q50,118 43,103" stroke="${sgd()}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M77,123 Q100,108 107,93"  stroke="${sgd()}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M59,121 Q43,111 40,99 Q51,107 60,115" fill="${sg()}" opacity="0.8"/>
      <path d="M90,111 Q106,101 110,89 Q99,97 89,105" fill="${sg()}" opacity="0.8"/>
    `;
    html += flower(43, 101, 13, 'var(--lavender)', 'var(--amber)', true);
    html += flower(107, 91, 13, 'var(--blush)',    'var(--gold)',  true);
    html += bud(56, 143, sg());
    html += bud(94, 138, sgl());
  }

  if (stage >= 5) {
    svg.innerHTML = `<g class="sway-root">${html}</g>`;
  } else {
    svg.innerHTML = html;
  }
}

function flower(cx, cy, r, petalCol, centCol, anim) {
  let s = `<g${anim ? ' class="bloom-pop"' : ''} style="transform-origin:${cx}px ${cy}px">`;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * 360;
    const rad = a * Math.PI / 180;
    const px = (cx + Math.cos(rad) * r * 0.9).toFixed(1);
    const py = (cy + Math.sin(rad) * r * 0.9).toFixed(1);
    s += `<ellipse cx="${px}" cy="${py}" rx="${(r*.55).toFixed(1)}" ry="${(r*.34).toFixed(1)}"
      fill="${petalCol}" opacity="0.88" transform="rotate(${a},${px},${py})"/>`;
  }
  s += `<circle cx="${cx}" cy="${cy}" r="${(r*.38).toFixed(1)}" fill="${centCol}" opacity="0.95"/>`;
  s += `<circle cx="${cx}" cy="${cy}" r="${(r*.17).toFixed(1)}" fill="white" opacity="0.55"/>`;
  s += `</g>`;
  return s;
}

function bud(cx, cy, col) {
  return `<ellipse cx="${cx}" cy="${cy}" rx="3.5" ry="5.5" fill="${col}" opacity="0.7"/>
    <line x1="${cx}" y1="${cy+5.5}" x2="${cx}" y2="${cy+11}" stroke="${sgd()}" stroke-width="1.5" stroke-linecap="round"/>`;
}

function sg()  { return '#8fb992'; }
function sgd() { return '#5a8a60'; }
function sgl() { return '#b8d4b8'; }

// ─── Start Over ───────────────────────────────────────────────
function startOver() {
  if (!confirm('Let go of this story and begin again?')) return;
  localStorage.removeItem('oracle_seed');
  localStorage.removeItem('oracle_story');
  localStorage.removeItem('oracle_mood');
  currentSeed = '';
  currentStage = -1;
  document.getElementById('mood-input').value = '';
  document.getElementById('seed-card-container').innerHTML = '';
  document.getElementById('story-textarea').value = '';
  document.getElementById('writing-section').classList.remove('visible');
  document.getElementById('wc-num').textContent = '0';
  // Pick a new painting
  const next = VAN_GOGH[Math.floor(Math.random() * VAN_GOGH.length)];
  document.body.style.backgroundImage = `url('${next}')`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Utils ────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────
(function init() {
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    updateKeyStatus();
  }
  const savedMood = localStorage.getItem('oracle_mood') || '';
  if (savedMood) document.getElementById('mood-input').value = savedMood;
  document.getElementById('mood-input').addEventListener('input', function() {
    localStorage.setItem('oracle_mood', this.value);
  });
  if (currentSeed) {
    renderSeedCard(currentSeed, savedMood);
    showWritingSection();
  }
  // Draw seed stage on load
  drawPlant(0);
})();
</script>
