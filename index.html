<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  THE GREENHOUSE — plant-your-story                          ║
  ║                                                              ║
  ║  A single-page creative writing app. The user describes     ║
  ║  their mood; the Groq API (llama-3.3-70b) generates a       ║
  ║  poetic opening line ("seed"). As the user writes their      ║
  ║  story in the textarea, a living SVG plant grows through     ║
  ║  6 stages tied to word count (0 → 5 → 20 → 50 → 100 → 200).║
  ║  The background is a randomly chosen Van Gogh painting.     ║
  ║  State (API key, seed, story, mood) persists in             ║
  ║  localStorage so sessions survive page refreshes.           ║
  ║                                                              ║
  ║  Stack: plain HTML/CSS/JS — no build step, no dependencies. ║
  ║  API:   Groq (OpenAI-compatible endpoint).                  ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Greenhouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #f5f0e8;
      --parchment:    #ede5d4;
      --warm-white:   #faf7f2;
      --ink:          #3b2f2f;
      --ink-light:    #6b5555;
      --sage:         #7a9e7e;
      --sage-dark:    #4d7358;
      --sage-light:   #a8c4a8;
      --blush:        #e8b4b8;
      --blush-deep:   #c97b84;
      --lavender:     #b8a8d4;
      --lavender-deep:#8870b0;
      --amber:        #c49a6c;
      --soil:         #7a5c3a;
      --soil-dark:    #5a3e22;
      --gold:         #d4a843;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── Noise / Paper Texture ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-ornament {
      font-size: 1.2rem;
      color: var(--amber);
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--ink-light);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* ─── API Key Settings ───────────────────────────────────── */
    .settings-panel {
      background: var(--parchment);
      border: 1px solid rgba(196, 154, 108, 0.3);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .settings-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-light);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .settings-label span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    .settings-label span.red { background: var(--blush-deep); }

    #api-key-input {
      flex: 1;
      min-width: 200px;
      background: var(--warm-white);
      border: 1px solid rgba(196, 154, 108, 0.4);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      font-size: 0.82rem;
      font-family: 'Inter', monospace;
      color: var(--ink);
      letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }

    #api-key-input:focus { outline: none; border-color: var(--amber); }

    .btn-save-key {
      background: var(--amber);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-save-key:hover { background: #b8892f; }
    .btn-save-key:active { transform: scale(0.97); }

    /* ─── Oracle Section ─────────────────────────────────────── */
    .oracle-section {
      background: var(--warm-white);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(59, 47, 47, 0.08);
      margin-bottom: 2rem;
      border: 1px solid rgba(196, 154, 108, 0.2);
    }

    .section-title {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 2px;
      background: var(--amber);
      border-radius: 2px;
    }

    .mood-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    #mood-input {
      flex: 1;
      min-width: 200px;
      background: var(--cream);
      border: 1.5px solid rgba(196, 154, 108, 0.35);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }

    #mood-input::placeholder { color: var(--amber); opacity: 0.6; }
    #mood-input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.12); }

    .btn-plant {
      background: linear-gradient(135deg, var(--sage), var(--sage-dark));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(77, 115, 88, 0.3);
      white-space: nowrap;
      align-self: flex-start;
    }

    .btn-plant:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(77, 115, 88, 0.4); }
    .btn-plant:active { transform: translateY(0); }
    .btn-plant:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ─── Seed Card ──────────────────────────────────────────── */
    .seed-card {
      margin-top: 1.5rem;
      background: linear-gradient(135deg, var(--parchment), #e8dfc8);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      border-left: 4px solid var(--amber);
      position: relative;
      overflow: hidden;
      animation: fadeSlideIn 0.5s ease;
    }

    .seed-card::before {
      content: '\201C';
      position: absolute;
      top: -0.5rem;
      left: 1rem;
      font-family: 'Lora', serif;
      font-size: 5rem;
      color: var(--amber);
      opacity: 0.2;
      line-height: 1;
      pointer-events: none;
    }

    .seed-text {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.7;
      color: var(--ink);
      position: relative;
      z-index: 1;
    }

    .seed-meta {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--ink-light);
      font-style: italic;
      opacity: 0.7;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ─── Writing + Plant Section ───────────────────────────── */
    .writing-section {
      display: none;
      animation: fadeSlideIn 0.6s ease;
    }

    .writing-section.visible { display: block; }

    .writing-grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      .writing-grid {
        grid-template-columns: 1fr;
      }
      .plant-panel { order: -1; }
    }

    /* ─── Textarea ───────────────────────────────────────────── */
    .writing-panel {
      background: var(--warm-white);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(59, 47, 47, 0.08);
      border: 1px solid rgba(196, 154, 108, 0.2);
    }

    .writing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    #story-textarea {
      width: 100%;
      min-height: 280px;
      background: var(--cream);
      border: 1.5px solid rgba(196, 154, 108, 0.3);
      border-radius: 12px;
      padding: 1rem;
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--ink);
      resize: vertical;
      transition: border-color 0.2s;
    }

    #story-textarea:focus { outline: none; border-color: var(--amber); }
    #story-textarea::placeholder { color: var(--ink-light); opacity: 0.5; font-style: italic; }

    .word-count-display {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--ink-light);
      text-align: right;
    }

    .word-count-display strong { color: var(--sage-dark); font-weight: 600; }

    /* ─── Plant Panel ────────────────────────────────────────── */
    .plant-panel {
      background: var(--warm-white);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 4px 24px rgba(59, 47, 47, 0.08);
      border: 1px solid rgba(196, 154, 108, 0.2);
      text-align: center;
      position: sticky;
      top: 1.5rem;
    }

    #plant-svg {
      width: 160px;
      height: 200px;
      display: block;
      margin: 0 auto 1rem;
      overflow: visible;
    }

    .plant-stage-label {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--sage-dark);
      margin-bottom: 0.25rem;
    }

    .plant-word-count {
      font-size: 0.75rem;
      color: var(--ink-light);
      opacity: 0.7;
    }

    /* ─── Restart Button ─────────────────────────────────────── */
    .restart-row {
      text-align: center;
      margin-top: 1.5rem;
    }

    .btn-restart {
      background: transparent;
      border: 1.5px solid rgba(196, 154, 108, 0.5);
      color: var(--ink-light);
      border-radius: 10px;
      padding: 0.55rem 1.25rem;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-restart:hover {
      border-color: var(--blush-deep);
      color: var(--blush-deep);
      background: rgba(232, 180, 184, 0.08);
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.75rem;
      color: var(--ink-light);
      opacity: 0.5;
      font-style: italic;
    }

    /* ─── Keyframes ──────────────────────────────────────────── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes sway {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(1.5deg); }
      75%  { transform: rotate(-1.5deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes bloomPop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes petalFade {
      from { opacity: 0; transform: scale(0.6) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .sway-root {
      transform-origin: 80px 195px;
      animation: sway 4s ease-in-out infinite;
    }

    .bloom-pop {
      transform-origin: center;
      animation: bloomPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* SVG transition helper */
    .plant-part {
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
  /* ─── Van Gogh Overrides ─────────────────────────────────── */

  body {
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: #1a1208;
  }

  /* Dark overlay */
  .bg-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.50);
    pointer-events: none;
    z-index: 0;
  }

  /* Frosted glass cards */
  .settings-panel,
  .oracle-section,
  .writing-panel,
  .plant-panel {
    background: rgba(255, 245, 230, 0.13) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3) !important;
  }

  .seed-card {
    background: rgba(212, 168, 67, 0.15) !important;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 4px solid rgba(212, 168, 67, 0.7) !important;
  }

  /* Light text */
  h1                   { color: #f5ede0 !important; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
  .subtitle            { color: #d4bfa0 !important; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
  .section-title       { color: #f0e4cc !important; }
  .section-title::before { background: rgba(212,168,67,0.8) !important; }
  .settings-label      { color: #d4bfa0 !important; }
  .plant-stage-label   { color: #a8c4a8 !important; }
  .plant-word-count    { color: #c8b89a !important; }
  .word-count-display  { color: #c8b89a !important; }
  .word-count-display strong { color: #a8c4a8 !important; }
  .seed-text           { color: #f5ede0 !important; text-shadow: 0 1px 6px rgba(0,0,0,0.4); }
  .seed-meta           { color: #c8b89a !important; }
  footer               { color: #c8b89a !important; }

  /* Inputs dark-transparent */
  #api-key-input {
    background: rgba(0,0,0,0.25) !important;
    border: 1px solid rgba(212,168,67,0.35) !important;
    color: #f5ede0 !important;
  }
  #api-key-input::placeholder { color: rgba(245,237,224,0.3) !important; }

  #mood-input {
    background: rgba(0,0,0,0.2) !important;
    border: 1.5px solid rgba(212,168,67,0.35) !important;
    color: #f5ede0 !important;
  }
  #mood-input::placeholder { color: rgba(245,237,224,0.35) !important; opacity: 1 !important; }
  #mood-input:focus { box-shadow: 0 0 0 3px rgba(212,168,67,0.15) !important; }

  #story-textarea {
    background: rgba(0,0,0,0.2) !important;
    border: 1.5px solid rgba(212,168,67,0.3) !important;
    color: #f5ede0 !important;
  }
  #story-textarea::placeholder { color: rgba(245,237,224,0.3) !important; opacity: 1 !important; }

  /* ─── Share Buttons ─────────────────────────────────────── */
  .seed-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .btn-seed-action {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    color: #c8b89a;
    border-radius: 8px;
    padding: 0.3rem 0.85rem;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .btn-seed-action:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(245,237,224,0.35);
    color: #f0e4cc;
  }

  /* Restart button */
  .btn-restart {
    border-color: rgba(255,255,255,0.2) !important;
    color: #c8b89a !important;
  }
  .btn-restart:hover {
    border-color: var(--blush-deep) !important;
    color: var(--blush) !important;
    background: rgba(201,123,132,0.1) !important;
  }

  /* ─── Sound Controls ─────────────────────────────────────── */
  .sound-controls {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .sound-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: rgba(200,184,154,0.65);
    margin-bottom: 0.6rem;
    letter-spacing: 0.06em;
  }
  .sound-btns {
    display: flex;
    gap: 0.35rem;
    justify-content: center;
    margin-bottom: 0.7rem;
  }
  .btn-sound {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(200,184,154,0.8);
    border-radius: 8px;
    padding: 0.28rem 0.6rem;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.74rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .btn-sound:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(245,237,224,0.28);
    color: #f0e4cc;
  }
  .btn-sound.active {
    background: rgba(122,158,126,0.22);
    border-color: rgba(122,158,126,0.55);
    color: #a8c4a8;
  }
  .sound-volume {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    justify-content: center;
  }
  .btn-mute {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(200,184,154,0.65);
    border-radius: 6px;
    padding: 0.18rem 0.45rem;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .btn-mute:hover { background: rgba(255,255,255,0.08); color: #f0e4cc; }
  #vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 72px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: rgba(212,168,67,0.8);
    cursor: pointer;
  }
  #vol-slider::-moz-range-thumb {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: rgba(212,168,67,0.8);
    cursor: pointer;
    border: none;
  }
  </style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="page-wrap">

  <!-- Header -->
  <header>
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1>The Greenhouse</h1>
    <p class="subtitle">plant a seed, let the story grow</p>
  </header>

  <!-- API Key Settings -->
  <div class="settings-panel">
    <div class="settings-label" id="key-status-label">
      <span class="red" id="key-dot"></span>Groq API key
    </div>
    <input type="password" id="api-key-input" placeholder="gsk_…" autocomplete="off" />
    <button class="btn-save-key" onclick="saveApiKey()">Save</button>
  </div>

  <!-- Oracle Section -->
  <div class="oracle-section">
    <div class="section-title">The Oracle</div>
    <div class="mood-row">
      <input
        id="mood-input"
        type="text"
        placeholder="describe your mood or vibe…"
        maxlength="200"
        onkeydown="if(event.key==='Enter') plantSeed()"
      />
      <button class="btn-plant" id="plant-btn" onclick="plantSeed()">
        plant a seed
      </button>
    </div>
    <div id="seed-card-container"></div>
  </div>

  <!-- Writing + Plant Section -->
  <div class="writing-section" id="writing-section">
    <div class="writing-grid">

      <!-- Textarea Panel -->
      <div class="writing-panel">
        <div class="writing-header">
          <div class="section-title" style="margin-bottom:0">Your Story</div>
        </div>
        <textarea
          id="story-textarea"
          placeholder="Continue from your seed… let the words come."
          oninput="onStoryInput()"
        ></textarea>
        <div class="word-count-display">
          <strong id="wc-num">0</strong> words
        </div>
      </div>

      <!-- Plant Panel -->
      <div class="plant-panel">
        <svg id="plant-svg" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Plant drawn programmatically by JS -->
        </svg>
        <div class="plant-stage-label" id="stage-label">a seed waiting</div>
        <div class="plant-word-count" id="stage-words">0 / 5 words</div>
        <div class="sound-controls">
          <div class="sound-label">ambient</div>
          <div class="sound-btns">
            <button class="btn-sound" id="snd-rain"   onclick="toggleSound('rain')">rain</button>
            <button class="btn-sound" id="snd-forest" onclick="toggleSound('forest')">forest</button>
            <button class="btn-sound" id="snd-cafe"   onclick="toggleSound('cafe')">café</button>
          </div>
          <div class="sound-volume">
            <button class="btn-mute" id="btn-mute" onclick="toggleMute()">♪ on</button>
            <input type="range" id="vol-slider" min="0" max="100" value="60" oninput="setVolume(this.value)" />
          </div>
        </div>
      </div>

    </div>

    <div class="restart-row">
      <button class="btn-restart" onclick="startOver()">✦ start over & plant a new seed</button>
    </div>
  </div>
  <footer>made with quiet wonder &amp; a little magic</footer>
</div>

<script>
// ─── Van Gogh Background ─────────────────────────────────────
// Pick one painting at random each page load and set it as the body background.
// The dark overlay div (.bg-overlay) sits on top so text stays readable.
const VAN_GOGH_PAINTINGS = [
  'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Vincent_van_Gogh_-_Wheatfield_with_crows_-_Google_Art_Project.jpg/1280px-Vincent_van_Gogh_-_Wheatfield_with_crows_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Van_Gogh_-_Almond_Blossom_-_Google_Art_Project.jpg/1280px-Van_Gogh_-_Almond_Blossom_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Irises-Vincent_van_Gogh.jpg/1280px-Irises-Vincent_van_Gogh.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Vincent_van_Gogh_-_De_slaapkamer_-_Google_Art_Project.jpg/1280px-Vincent_van_Gogh_-_De_slaapkamer_-_Google_Art_Project.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Van_Gogh_Cafe_terrace_at_night_%28Yorck%29.jpg/1024px-Van_Gogh_Cafe_terrace_at_night_%28Yorck%29.jpg',
];
const currentPainting = VAN_GOGH_PAINTINGS[Math.floor(Math.random() * VAN_GOGH_PAINTINGS.length)];
document.body.style.backgroundImage = `url('${currentPainting}')`;

// ─── State ──────────────────────────────────────────────────
// apiKey     — Groq API key entered by the user, persisted in localStorage
// currentSeed — the AI-generated opening line currently displayed
// currentStage — tracks which plant stage is drawn so we only redraw on change
let apiKey = localStorage.getItem('oracle_api_key') || '';
let currentSeed = localStorage.getItem('oracle_seed') || '';
let currentStage = -1;

// ─── API Key ─────────────────────────────────────────────────
// Saves the key to localStorage and updates the status dot (green = valid, red = missing).
// The key is never sent anywhere except directly to Groq.
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('oracle_api_key', val);
  updateKeyStatus();
}

function updateKeyStatus() {
  const dot = document.getElementById('key-dot');
  if (apiKey && apiKey.length > 10) {
    dot.classList.remove('red');
    dot.style.background = 'var(--sage)';
  } else {
    dot.classList.add('red');
    dot.style.background = 'var(--blush-deep)';
  }
}

// ─── Oracle: Plant a Seed ─────────────────────────────────────
// Calls the Groq chat completions endpoint (OpenAI-compatible) with the user's
// mood string. The model returns a single poetic opening line ("seed").
// On success: renders the seed card and reveals the writing section.
// On failure: shows the error inline inside a styled seed card.
async function plantSeed() {
  if (!apiKey) {
    alert('Please enter your Anthropic API key first.');
    document.getElementById('api-key-input').focus();
    return;
  }

  const mood = document.getElementById('mood-input').value.trim();
  if (!mood) {
    document.getElementById('mood-input').focus();
    return;
  }

  const btn = document.getElementById('plant-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>consulting the oracle…';

  const container = document.getElementById('seed-card-container');
  container.innerHTML = '';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 120,
        temperature: 1.0,
        messages: [{
          role: 'user',
          content: `You are a literary oracle. Given a mood or vibe, generate exactly ONE opening line for a literary novel.
The line must be poetic, mysterious, and evocative — like the opening of a Booker Prize winner.
Under 60 words. No quotation marks. No explanation. Just the line itself.

Mood / vibe: "${mood}"`,
        }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const seedText = data.choices?.[0]?.message?.content?.trim() || '';

    if (!seedText) throw new Error('Empty response from oracle.');

    currentSeed = seedText;
    localStorage.setItem('oracle_seed', seedText);

    renderSeedCard(seedText, mood);
    showWritingSection();
  } catch (e) {
    container.innerHTML = `<div class="seed-card" style="border-left-color:var(--blush-deep)">
      <p class="seed-text" style="color:var(--blush-deep)">The oracle is silent: ${e.message}</p>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'plant a seed';
  }
}

function renderSeedCard(text, mood) {
  const container = document.getElementById('seed-card-container');
  container.innerHTML = `
    <div class="seed-card">
      <p class="seed-text">${escapeHtml(text)}</p>
      <p class="seed-meta">born from: "${escapeHtml(mood)}"</p>
    </div>
    <div class="seed-actions">
      <button class="btn-seed-action" onclick="saveAsImage()">save as image</button>
      <button class="btn-seed-action" id="btn-copy-seed" onclick="copySeed()">copy seed</button>
    </div>`;
}

// ─── Writing Section ──────────────────────────────────────────
// Reveals the textarea + plant panel, restores any previously saved story
// from localStorage, and scrolls smoothly into view.
function showWritingSection() {
  const section = document.getElementById('writing-section');
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const saved = localStorage.getItem('oracle_story') || '';
  document.getElementById('story-textarea').value = saved;
  updatePlant(countWords(saved));
}

// Fires on every keystroke: persists the story and triggers plant growth.
function onStoryInput() {
  const text = document.getElementById('story-textarea').value;
  localStorage.setItem('oracle_story', text);
  const wc = countWords(text);
  document.getElementById('wc-num').textContent = wc;
  updatePlant(wc);
}

function countWords(text) {
  return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
}

// ─── Plant SVG ────────────────────────────────────────────────
// The plant grows through 6 stages keyed to word-count milestones.
// STAGES drives both the sidebar label and the "X / Y words" progress line.
const STAGES = [
  { min: 0,   label: 'a seed waiting',   next: 5   },
  { min: 5,   label: 'a sprout emerges', next: 20  },
  { min: 20,  label: 'first leaves',     next: 50  },
  { min: 50,  label: 'growing tall',     next: 100 },
  { min: 100, label: 'a flower blooms',  next: 200 },
  { min: 200, label: 'in full bloom',    next: null },
];

function getStage(wc) {
  if (wc >= 200) return 5;
  if (wc >= 100) return 4;
  if (wc >= 50)  return 3;
  if (wc >= 20)  return 2;
  if (wc >= 5)   return 1;
  return 0;
}

// Updates the label + progress counter, then redraws the SVG only when the
// stage actually changes (avoids unnecessary DOM writes on every keystroke).
function updatePlant(wc) {
  const stage = getStage(wc);
  const stageInfo = STAGES[stage];

  document.getElementById('stage-label').textContent = stageInfo.label;
  document.getElementById('stage-words').textContent = stageInfo.next
    ? `${wc} / ${stageInfo.next} words`
    : `${wc} words — full bloom!`;

  if (stage !== currentStage) {
    currentStage = stage;
    drawPlant(stage);
  }
}

// Imperatively builds the plant SVG string for the given stage and injects it.
// Each stage is additive — higher stages include all lower-stage elements plus
// new ones (branches, extra leaves, flowers). Stage 5 wraps everything in a
// sway group so the whole plant gently rocks via CSS animation.
function drawPlant(stage) {
  const svg = document.getElementById('plant-svg');

  let content = '';

  // ── Soil (always visible) ──
  content += `
    <!-- Soil -->
    <ellipse cx="80" cy="190" rx="55" ry="10" fill="${soil(0.9)}" />
    <ellipse cx="80" cy="187" rx="48" ry="7" fill="${soil(0.6)}" />
    <ellipse cx="80" cy="185" rx="38" ry="4" fill="${soil(0.4)}" />
  `;

  if (stage === 0) {
    // ── Stage 0: Seed ──
    content += `
      <!-- Seed -->
      <ellipse cx="80" cy="180" rx="9" ry="6" fill="#8B6340" />
      <ellipse cx="80" cy="179" rx="7" ry="5" fill="#A07848" />
      <line x1="80" y1="174" x2="80" y2="170" stroke="${sage()}" stroke-width="1.5" stroke-linecap="round"/>
    `;
  }

  if (stage >= 1) {
    // Stem height scales with stage so the plant visibly stretches as it matures.
    const stemH = stage === 1 ? 30 : 80 + (stage - 1) * 15;
    const stemTop = 185 - stemH;
    content += `
      <!-- Main stem -->
      <path d="M80,185 Q78,${185 - stemH * 0.4} 80,${stemTop}"
        stroke="${sageD()}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    `;
  }

  if (stage === 1) {
    // ── Stage 1: Tiny sprout with 2 seed leaves ──
    content += `
      <ellipse cx="72" cy="160" rx="9" ry="5" fill="${sageL()}" transform="rotate(-25,72,160)"/>
      <ellipse cx="88" cy="160" rx="9" ry="5" fill="${sageL()}" transform="rotate(25,88,160)"/>
    `;
  }

  if (stage >= 2) {
    // ── Stage 2+: Leaves ──
    // Left leaf set 1
    content += `
      <path d="M78,155 Q55,145 52,130 Q62,138 78,148" fill="${sage()}" opacity="0.9"/>
      <path d="M82,150 Q105,140 108,125 Q98,133 82,143" fill="${sage()}" opacity="0.9"/>
    `;
  }

  if (stage >= 3) {
    // ── Stage 3+: More leaves higher up ──
    content += `
      <path d="M78,125 Q55,112 50,98 Q62,108 79,118" fill="${sageD()}" opacity="0.85"/>
      <path d="M82,120 Q105,107 110,93 Q98,103 81,113" fill="${sageD()}" opacity="0.85"/>
      <!-- Small leaf mid -->
      <path d="M79,140 Q68,128 66,118 Q73,126 80,134" fill="${sage()}" opacity="0.7"/>
    `;
  }

  if (stage >= 4) {
    // ── Stage 4: First flower at top ──
    const fx = 80, fy = 95;
    content += flowerSVG(fx, fy, 18, 'var(--blush)', 'var(--gold)', true);
  }

  if (stage >= 5) {
    // ── Stage 5: Full bloom — side branches + extra flowers ──
    // Left branch
    content += `
      <path d="M78,140 Q55,125 48,110" stroke="${sageD()}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M82,130 Q105,115 112,100" stroke="${sageD()}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Extra leaves on branches -->
      <path d="M64,128 Q48,118 45,106 Q56,114 65,122" fill="${sage()}" opacity="0.8"/>
      <path d="M95,118 Q111,108 115,96 Q104,104 94,112" fill="${sage()}" opacity="0.8"/>
    `;
    // Side flowers
    content += flowerSVG(48, 108, 14, 'var(--lavender)', 'var(--amber)', true);
    content += flowerSVG(112, 98, 14, 'var(--blush)', 'var(--gold)', true);
    // Small buds
    content += bud(60, 150, sage());
    content += bud(100, 145, sageL());
  }

  // Wrap in sway group for stage 5
  if (stage >= 5) {
    svg.innerHTML = `<g class="sway-root">${content}</g>`;
  } else {
    svg.innerHTML = content;
  }
}

// Draws a 5-petal flower centered at (cx, cy) with radius r.
// Each petal is an ellipse rotated to face outward from the center.
// The bloom-pop CSS class triggers a scale-in animation when first rendered.
function flowerSVG(cx, cy, r, petalColor, centerColor, animate) {
  const petals = 5;
  let s = '';
  const animClass = animate ? ' class="bloom-pop"' : '';
  s += `<g${animClass} style="transform-origin:${cx}px ${cy}px">`;

  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * 360;
    const rad = angle * Math.PI / 180;
    // Place each petal slightly offset from center, then rotate it to point outward.
    const px = cx + Math.cos(rad) * r * 0.9;
    const py = cy + Math.sin(rad) * r * 0.9;
    s += `<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${(r * 0.55).toFixed(1)}" ry="${(r * 0.35).toFixed(1)}"
      fill="${petalColor}" opacity="0.88"
      transform="rotate(${angle},${px.toFixed(1)},${py.toFixed(1)})"/>`;
  }
  // Center
  s += `<circle cx="${cx}" cy="${cy}" r="${(r * 0.38).toFixed(1)}" fill="${centerColor}" opacity="0.95"/>`;
  // Center dot
  s += `<circle cx="${cx}" cy="${cy}" r="${(r * 0.18).toFixed(1)}" fill="white" opacity="0.6"/>`;
  s += `</g>`;
  return s;
}

function bud(cx, cy, color) {
  return `<ellipse cx="${cx}" cy="${cy}" rx="4" ry="6" fill="${color}" opacity="0.7"/>
    <line x1="${cx}" y1="${cy + 6}" x2="${cx}" y2="${cy + 12}" stroke="${sageD()}" stroke-width="1.5" stroke-linecap="round"/>`;
}

// Color helpers
function sage()  { return '#7a9e7e'; }
function sageD() { return '#4d7358'; }
function sageL() { return '#b4ceb4'; }
function soil(o) {
  return `rgba(90, 62, 34, ${o})`;
}


// ─── Canvas text wrap helper ─────────────────────────────────
function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

// ─── Save as Image ───────────────────────────────────────────
// Renders the seed card as a 1200×675 PNG using the Canvas API:
//   1. Draws the current Van Gogh painting as a cover-fit background.
//   2. Applies a dark overlay for legibility.
//   3. Word-wraps and centers the seed text in italic serif.
//   4. Optionally adds the "born from:" mood line and a watermark.
//   5. Triggers a download via a temporary <a> element.
// Uses crossOrigin = 'anonymous' on the image so Canvas doesn't get tainted
// by the external Wikipedia image URLs.
async function saveAsImage() {
  const btn = document.querySelector('.btn-seed-action');
  const orig = btn.textContent;
  btn.textContent = 'generating…';
  btn.disabled = true;

  try {
    const W = 1200, H = 675;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Load Van Gogh painting
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = currentPainting;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });

    // Draw painting cover-fit
    const scale = Math.max(W / img.width, H / img.height);
    const ix = (W - img.width * scale) / 2;
    const iy = (H - img.height * scale) / 2;
    ctx.drawImage(img, ix, iy, img.width * scale, img.height * scale);

    // Dark overlay
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    const mood = localStorage.getItem('oracle_mood') || '';
    const story = document.getElementById('story-textarea').value.trim();
    const maxW = W * 0.72;
    const padX = W / 2;

    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';

    // ── Seed line (italic, larger) ──
    const seedFontSize = story ? 28 : 38;
    ctx.font = `italic ${seedFontSize}px Georgia, serif`;
    ctx.fillStyle = '#f5ede0';
    ctx.textBaseline = 'top';
    ctx.shadowBlur = 14;

    const seedLines = wrapText(ctx, currentSeed, maxW);
    const seedLH = seedFontSize * 1.65;

    // ── Story text (smaller, not italic) ──
    const storyFontSize = 19;
    ctx.font = `${storyFontSize}px Georgia, serif`;
    const storyLines = story ? wrapText(ctx, story, maxW) : [];
    const storyLH = storyFontSize * 1.7;

    // Total block height
    const dividerH = story ? 28 : 0;
    const moodH = mood ? 30 : 0;
    const totalH = seedLines.length * seedLH + dividerH + storyLines.length * storyLH + moodH;

    let y = H / 2 - totalH / 2;

    // Draw seed lines
    ctx.font = `italic ${seedFontSize}px Georgia, serif`;
    ctx.fillStyle = '#f5ede0';
    ctx.shadowBlur = 14;
    seedLines.forEach(l => { ctx.fillText(l, padX, y); y += seedLH; });

    // Divider rule between seed and story
    if (story) {
      y += 10;
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(245,237,224,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 60, y);
      ctx.lineTo(W / 2 + 60, y);
      ctx.stroke();
      y += 18;

      // Draw story lines
      ctx.font = `${storyFontSize}px Georgia, serif`;
      ctx.fillStyle = 'rgba(245,237,224,0.88)';
      ctx.shadowBlur = 8;
      storyLines.forEach(l => { ctx.fillText(l, padX, y); y += storyLH; });
    }

    // "born from" line
    if (mood) {
      y += 8;
      ctx.shadowBlur = 6;
      ctx.font = `italic 17px Georgia, serif`;
      ctx.fillStyle = 'rgba(245,237,224,0.45)';
      ctx.fillText(`born from: "${mood}"`, padX, y);
    }

    // Watermark
    ctx.shadowBlur = 4;
    ctx.font = `14px Georgia, serif`;
    ctx.fillStyle = 'rgba(245,237,224,0.38)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('the greenhouse', W - 32, H - 28);

    // Download
    const a = document.createElement('a');
    a.download = 'my-seed.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (e) {
    alert('Could not generate image: ' + e.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ─── Copy Seed ────────────────────────────────────────────────
// Writes the current seed text to the clipboard and briefly flashes "copied ✓".
async function copySeed() {
  const btn = document.getElementById('btn-copy-seed');
  try {
    await navigator.clipboard.writeText(currentSeed);
    btn.textContent = 'copied ✓';
    setTimeout(() => { btn.textContent = 'copy seed'; }, 2000);
  } catch (e) {
    btn.textContent = 'copy seed';
  }
}

// ─── Start Over ───────────────────────────────────────────────
// Clears all localStorage entries for this session and resets the UI to its
// initial empty state, ready for a new mood and seed.
function startOver() {
  if (!confirm('Clear your story and start fresh?')) return;
  localStorage.removeItem('oracle_seed');
  localStorage.removeItem('oracle_story');
  currentSeed = '';
  currentStage = -1;
  document.getElementById('mood-input').value = '';
  document.getElementById('seed-card-container').innerHTML = '';
  document.getElementById('story-textarea').value = '';
  document.getElementById('writing-section').classList.remove('visible');
  document.getElementById('wc-num').textContent = '0';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Utils ────────────────────────────────────────────────────
// Escapes user-supplied strings before inserting them into innerHTML to prevent XSS.
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────
// Runs on page load. Restores persisted state so the user can pick up exactly
// where they left off: API key status, last seed card, last story draft, and
// the mood text they typed. Also wires up the mood input → localStorage sync.
(function init() {
  // Restore API key
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    updateKeyStatus();
  }

  // Restore seed card
  if (currentSeed) {
    const savedMood = localStorage.getItem('oracle_mood') || '';
    renderSeedCard(currentSeed, savedMood);
    showWritingSection();
  }

  // Save mood on input for restore
  document.getElementById('mood-input').addEventListener('input', function () {
    localStorage.setItem('oracle_mood', this.value);
  });
  const savedMood = localStorage.getItem('oracle_mood') || '';
  if (savedMood) document.getElementById('mood-input').value = savedMood;
})();

// ─── Ambient Sound Engine ─────────────────────────────────────
let audioCtx    = null;
let masterGain  = null;
let activeSound = null;  // 'rain' | 'forest' | 'cafe' | null
let isMuted     = false;
let soundNodes  = [];    // stoppable AudioNodes (sources + oscillators)
let soundTimers = [];    // setTimeout IDs for bird/clink scheduling

function ensureCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopAll() {
  soundTimers.forEach(id => clearTimeout(id));
  soundTimers = [];
  soundNodes.forEach(n => { try { n.stop(); } catch (_) {} });
  soundNodes = [];
}

function toggleSound(name) {
  ensureCtx();
  if (activeSound === name) {
    stopAll();
    activeSound = null;
  } else {
    stopAll();
    activeSound = name;
    if (name === 'rain')   buildRain(audioCtx);
    if (name === 'forest') buildForest(audioCtx);
    if (name === 'cafe')   buildCafe(audioCtx);
  }
  updateSoundUI();
}

function toggleMute() {
  isMuted = !isMuted;
  if (masterGain) {
    masterGain.gain.setTargetAtTime(
      isMuted ? 0 : volValue(),
      audioCtx.currentTime, 0.1
    );
  }
  document.getElementById('btn-mute').textContent = isMuted ? '♪ off' : '♪ on';
}

function setVolume(val) {
  if (!masterGain || isMuted) return;
  masterGain.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.05);
}

function volValue() {
  return (document.getElementById('vol-slider')?.value ?? 60) / 100;
}

function updateSoundUI() {
  ['rain', 'forest', 'cafe'].forEach(name => {
    const btn = document.getElementById(`snd-${name}`);
    if (btn) btn.classList.toggle('active', activeSound === name);
  });
}

// Creates a looping white-noise buffer source
function makeNoiseBuf(ctx, seconds = 3) {
  const len = ctx.sampleRate * seconds;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function noiseSrc(ctx, buf) {
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.loop   = true;
  return src;
}

// Returns a GainNode driven by a slow LFO; connect its output to any AudioParam
function makeLFO(ctx, freq, depth) {
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;
  const g = ctx.createGain();
  g.gain.value = depth;
  osc.connect(g);
  osc.start();
  soundNodes.push(osc);
  return g;
}

// ─── Rain ─────────────────────────────────────────────────────
function buildRain(ctx) {
  const buf = makeNoiseBuf(ctx, 4);

  // Main rain body — lowpass filtered white noise
  const src  = noiseSrc(ctx, buf);
  const lpf  = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 1300; lpf.Q.value = 0.7;
  const gMain = ctx.createGain();
  gMain.gain.value = 0.65;
  src.connect(lpf); lpf.connect(gMain); gMain.connect(masterGain);
  src.start();
  soundNodes.push(src);

  // Slow intensity swell
  makeLFO(ctx, 0.04, 0.14).connect(gMain.gain);

  // High-frequency drizzle shimmer
  const src2 = noiseSrc(ctx, buf);
  const hpf  = ctx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 5500;
  const gHigh = ctx.createGain();
  gHigh.gain.value = 0.07;
  src2.connect(hpf); hpf.connect(gHigh); gHigh.connect(masterGain);
  src2.start();
  soundNodes.push(src2);
}

// ─── Forest ───────────────────────────────────────────────────
function buildForest(ctx) {
  const buf = makeNoiseBuf(ctx, 3);

  // Wind — bandlimited noise
  const wind = noiseSrc(ctx, buf);
  const lpf  = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 650;
  const hpf  = ctx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 55;
  const gWind = ctx.createGain();
  gWind.gain.value = 0.38;
  wind.connect(lpf); lpf.connect(hpf); hpf.connect(gWind); gWind.connect(masterGain);
  wind.start();
  soundNodes.push(wind);
  makeLFO(ctx, 0.07, 0.18).connect(gWind.gain);

  // Leaf rustle — high bandpass shimmer
  const rustle = noiseSrc(ctx, buf);
  const bpf    = ctx.createBiquadFilter();
  bpf.type = 'bandpass'; bpf.frequency.value = 3800; bpf.Q.value = 0.9;
  const gRustle = ctx.createGain();
  gRustle.gain.value = 0.11;
  rustle.connect(bpf); bpf.connect(gRustle); gRustle.connect(masterGain);
  rustle.start();
  soundNodes.push(rustle);

  scheduleBird(ctx);
}

function scheduleBird(ctx) {
  if (activeSound !== 'forest') return;
  const delay = 2800 + Math.random() * 5500;
  soundTimers.push(setTimeout(() => {
    if (activeSound === 'forest') { chirp(ctx); scheduleBird(ctx); }
  }, delay));
}

function chirp(ctx) {
  const notes = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < notes; i++) {
    setTimeout(() => {
      if (activeSound !== 'forest') return;
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      const f0  = 2600 + Math.random() * 1800;
      const f1  = f0 * (0.78 + Math.random() * 0.44);
      const dur = 0.07 + Math.random() * 0.11;
      const t   = ctx.currentTime;
      osc.frequency.setValueAtTime(f0, t);
      osc.frequency.linearRampToValueAtTime(f1, t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.055 + Math.random() * 0.035, t + 0.01);
      g.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + dur + 0.05);
    }, i * (100 + Math.random() * 160));
  }
}

// ─── Café ─────────────────────────────────────────────────────
function buildCafe(ctx) {
  const buf = makeNoiseBuf(ctx, 3);

  // Crowd murmur — stacked bandpass layers simulating voice frequencies
  [[300, 2.5, 0.24], [750, 1.8, 0.17], [1500, 2.2, 0.09]].forEach(([freq, Q, gain]) => {
    const src = noiseSrc(ctx, buf);
    const f   = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = Q;
    const g = ctx.createGain();
    g.gain.value = gain;
    src.connect(f); f.connect(g); g.connect(masterGain);
    src.start(); soundNodes.push(src);
  });

  // Low room rumble
  const rumble = noiseSrc(ctx, buf);
  const lpf    = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 105;
  const gRumble = ctx.createGain();
  gRumble.gain.value = 0.26;
  rumble.connect(lpf); lpf.connect(gRumble); gRumble.connect(masterGain);
  rumble.start(); soundNodes.push(rumble);

  scheduleClink(ctx);
}

function scheduleClink(ctx) {
  if (activeSound !== 'cafe') return;
  const delay = 4500 + Math.random() * 8000;
  soundTimers.push(setTimeout(() => {
    if (activeSound === 'cafe') { clink(ctx); scheduleClink(ctx); }
  }, delay));
}

function clink(ctx) {
  const base = 1900 + Math.random() * 1100;
  // Three harmonic partials with slight delay stagger for realism
  [[base, 0], [base * 1.48, 30], [base * 2.12, 55]].forEach(([freq, msDelay]) => {
    setTimeout(() => {
      if (activeSound !== 'cafe') return;
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const dur = 0.28 + Math.random() * 0.25;
      const t   = ctx.currentTime;
      const g   = ctx.createGain();
      g.gain.setValueAtTime(0.038, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + dur + 0.05);
    }, msDelay);
  });
}

// ─── Focus / Blur ─────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (!audioCtx) return;
  if (document.hidden) audioCtx.suspend();
  else if (activeSound) audioCtx.resume();
});
</script>
